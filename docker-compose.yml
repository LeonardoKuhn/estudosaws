# ===========================================================================
# Local orchestration of the STATEFUL half of the study: postgres + redis +
# api + worker. The frontend (web/) runs outside the compose, via `npm run dev`.
#
# CORE CONCEPT of this phase: `api` and `worker` use the SAME image/build
# (./api). The only difference between them is the start `command`:
#   - api    -> node dist/main.js   (HTTP server)
#   - worker -> node dist/worker.js (queue consumer, no port)
# ===========================================================================

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # No host port published: api and worker reach it over the compose internal
    # network (hostname `postgres`). Avoids clashing with local Postgres.
    volumes:
      # Named volume -> the data (the count) survives `down`/`up`.
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    # No volume: an ephemeral queue is fine for the study.
    # No host port published: reached only internally (hostname `redis`).
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    # Explicit tag: api and worker point to THIS same image. Compose builds it
    # once and both services reuse the same Image ID.
    image: deploy-estudo-api:latest
    # Migration strategy (simple): run `prisma migrate deploy` BEFORE starting
    # the API. Since api and worker share the same database, the migration lives
    # only here; the worker waits for the API to become healthy.
    command: sh -c "npx prisma migrate deploy && node dist/main.js"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      REDIS_URL: redis://redis:6379
      PORT: 3000
    # Host 3010 -> container 3000 (host port 3000 was already in use).
    # The frontend reads NEXT_PUBLIC_API_URL=http://localhost:3010 (see .env).
    ports:
      - '3010:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        ['CMD-SHELL', 'node -e "fetch(''http://localhost:3000/clicks/count'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"']
      interval: 5s
      timeout: 5s
      retries: 10

  worker:
    # SAME image as the api (same `image:` above). Only the command changes (and
    # it exposes no port). `build` here also ensures the image exists even if the
    # worker is started in isolation.
    build: ./api
    image: deploy-estudo-api:latest
    command: node dist/worker.js
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      # Ensures the migration (run by the api) has already applied the schema.
      api:
        condition: service_healthy

volumes:
  postgres_data:
